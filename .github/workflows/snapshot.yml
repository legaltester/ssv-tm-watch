name: SSV trademark snapshot

on:
  schedule:
    - cron: '15 4 * * *'   # 04:15 UTC ≈ 06:15 Europe/Belgrade — lands before the Brains run at 07:30
  workflow_dispatch: {}     # manual "Run workflow" button (use this for the first validation run)

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Playwright Chromium
        run: |
          npm i playwright@1.48.2
          npx playwright install --with-deps chromium
      - name: Fetch portfolio (TMView + national registers)
        env:
          USPTO_API_KEY: ${{ secrets.USPTO_API_KEY }}
        run: node fetch_portfolio.mjs
      - name: Commit snapshot if changed
        run: |
          git config user.name "ssv-tm-watch-bot"
          git config user.email "actions@users.noreply.github.com"
          git add snapshot.json
          git diff --cached --quiet || git commit -m "snapshot $(date -u +%FT%TZ)"
          git push
